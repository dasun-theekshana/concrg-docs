<svg viewBox="0 0 480 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- User Question -->
  <rect x="90" y="20" width="300" height="64" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="47" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">User asks a question</text>
  <text x="240" y="67" text-anchor="middle" font-size="11" fill="#64748b">Natural language via the command bar</text>

  <line x1="240" y1="84" x2="240" y2="108" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Mode Classification -->
  <rect x="90" y="112" width="300" height="72" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="240" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Mode Classification</text>
  <text x="240" y="157" text-anchor="middle" font-size="11" fill="#6d28d9">SENSE detects intent automatically</text>
  <text x="240" y="174" text-anchor="middle" font-size="10" fill="#7c3aed">FIND · LEARN · PRACTICE · REMEMBER</text>

  <line x1="240" y1="184" x2="240" y2="208" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Knowledge Graph Query -->
  <rect x="90" y="212" width="300" height="72" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="240" y="238" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Knowledge Graph Query</text>
  <text x="240" y="257" text-anchor="middle" font-size="11" fill="#2563eb">Graph RAG retrieves relevant facts</text>
  <text x="240" y="274" text-anchor="middle" font-size="10" fill="#3b82f6">Pages · workflows · roles · relationships</text>

  <line x1="240" y1="284" x2="240" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AI Response -->
  <rect x="90" y="312" width="300" height="72" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="240" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">AI-grounded Response</text>
  <text x="240" y="357" text-anchor="middle" font-size="11" fill="#059669">Claude generates answer from your knowledge</text>
  <text x="240" y="374" text-anchor="middle" font-size="10" fill="#10b981">Grounded · role-aware · context-aware</text>

  <line x1="240" y1="384" x2="240" y2="408" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- In-app UI -->
  <rect x="90" y="412" width="300" height="72" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="240" y="438" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">In-app Response UI</text>
  <text x="240" y="457" text-anchor="middle" font-size="11" fill="#ea580c">Delivered in the right format for the mode</text>
  <text x="240" y="474" text-anchor="middle" font-size="10" fill="#f97316">Navigation · explanation card · walkthrough · timeline</text>

</svg>
