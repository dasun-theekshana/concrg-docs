<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="senseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B3FE8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- SENSE node (top) -->
  <rect x="280" y="30" width="200" height="80" rx="12" fill="url(#senseGrad)"/>
  <circle cx="320" cy="70" r="22" fill="white" fill-opacity="0.2"/>
  <text x="320" y="78" text-anchor="middle" font-size="22" font-weight="700" fill="white">S</text>
  <text x="360" y="64" font-size="15" font-weight="700" fill="white">SENSE</text>
  <text x="360" y="84" font-size="11" fill="white" fill-opacity="0.9">proactive detection</text>

  <!-- Vertical trunk line -->
  <line x1="380" y1="110" x2="380" y2="460" stroke="#cbd5e1" stroke-width="2"/>

  <!-- FIND -->
  <line x1="380" y1="160" x2="420" y2="160" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="420" y="130" width="280" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="450" cy="160" r="18" fill="#3b82f6"/>
  <text x="450" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="white">F</text>
  <text x="480" y="156" font-size="14" font-weight="700" fill="#1e3a8a">FIND</text>
  <text x="480" y="176" font-size="12" fill="#475569" font-style="italic">"Where is it?"</text>

  <!-- LEARN -->
  <line x1="380" y1="240" x2="420" y2="240" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="420" y="210" width="280" height="60" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <circle cx="450" cy="240" r="18" fill="#059669"/>
  <text x="450" y="246" text-anchor="middle" font-size="16" font-weight="700" fill="white">L</text>
  <text x="480" y="236" font-size="14" font-weight="700" fill="#064e3b">LEARN</text>
  <text x="480" y="256" font-size="12" fill="#475569" font-style="italic">"What does it do?"</text>

  <!-- PRACTICE -->
  <line x1="380" y1="320" x2="420" y2="320" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="420" y="290" width="280" height="60" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <circle cx="450" cy="320" r="18" fill="#ea580c"/>
  <text x="450" y="326" text-anchor="middle" font-size="16" font-weight="700" fill="white">P</text>
  <text x="480" y="316" font-size="14" font-weight="700" fill="#7c2d12">PRACTICE</text>
  <text x="480" y="336" font-size="12" fill="#475569" font-style="italic">"How do I use it?"</text>

  <!-- REMEMBER -->
  <line x1="380" y1="400" x2="420" y2="400" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="420" y="370" width="280" height="60" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <circle cx="450" cy="400" r="18" fill="#db2777"/>
  <text x="450" y="406" text-anchor="middle" font-size="16" font-weight="700" fill="white">R</text>
  <text x="480" y="396" font-size="14" font-weight="700" fill="#831843">REMEMBER</text>
  <text x="480" y="416" font-size="12" fill="#475569" font-style="italic">"I've done this before"</text>

  <!-- Bottom cap on trunk -->
  <circle cx="380" cy="460" r="4" fill="#cbd5e1"/>

  <!-- Caption -->
  <text x="380" y="500" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">SENSE runs in the background and routes users into the right mode.</text>
</svg>
