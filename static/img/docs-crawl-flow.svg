<svg viewBox="0 0 440 490" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="60" y="10" width="320" height="64" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="220" y="37" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Start at your docs URL</text>
