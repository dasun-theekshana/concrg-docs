<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="40" height="40">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B3FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Graph nodes representing the CRG -->
  <circle cx="100" cy="40" r="20" fill="url(#grad)"/>
  <circle cx="40" cy="140" r="20" fill="url(#grad)"/>
  <circle cx="160" cy="140" r="20" fill="url(#grad)"/>
  <!-- Edges -->
  <line x1="100" y1="60" x2="55" y2="125" stroke="#5B3FE8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="145" y2="125" stroke="#5B3FE8" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="140" x2="140" y2="140" stroke="#5B3FE8" stroke-width="4" stroke-linecap="round"/>
  <!-- Inner dots -->
  <circle cx="100" cy="40" r="8" fill="white"/>
  <circle cx="40" cy="140" r="8" fill="white"/>
  <circle cx="160" cy="140" r="8" fill="white"/>
</svg>
