<svg viewBox="0 0 440 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="60" y="10" width="320" height="64" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="220" y="37" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Start at app root</text>
  <text x="220" y="57" text-anchor="middle" font-size="11" fill="#6d28d9">Begin exploration from the home page</text>

  <line x1="220" y1="74" x2="220" y2="98" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="102" width="320" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="129" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Read the page</text>
  <text x="220" y="149" text-anchor="middle" font-size="11" fill="#2563eb">Map structure, elements, navigation links</text>

  <line x1="220" y1="166" x2="220" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="194" width="320" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="221" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Capture visual snapshot</text>
  <text x="220" y="241" text-anchor="middle" font-size="11" fill="#2563eb">Record what the user sees on this page</text>

  <line x1="220" y1="258" x2="220" y2="282" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="286" width="320" height="64" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="220" y="313" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">AI analyzes the page</text>
  <text x="220" y="333" text-anchor="middle" font-size="11" fill="#059669">Understands purpose, features, workflows</text>

  <line x1="220" y1="350" x2="220" y2="374" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="378" width="320" height="64" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="220" y="405" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Extract knowledge</text>
  <text x="220" y="425" text-anchor="middle" font-size="11" fill="#059669">Roles, elements, relationships added to graph</text>

  <line x1="220" y1="442" x2="220" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="470" width="320" height="64" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="220" y="497" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Follow links → repeat</text>
  <text x="220" y="517" text-anchor="middle" font-size="11" fill="#ea580c">Queue and explore every discovered page</text>

</svg>
