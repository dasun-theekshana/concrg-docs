<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B3FE8"/>
    </marker>
  </defs>

  <!-- Three input boxes -->
  <rect x="20" y="20" width="200" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Intent</text>
  <text x="120" y="68" text-anchor="middle" font-size="11" fill="#64748b">What is the user</text>
  <text x="120" y="84" text-anchor="middle" font-size="11" fill="#64748b">trying to do?</text>

  <rect x="280" y="20" width="200" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="380" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Journey Stage</text>
  <text x="380" y="68" text-anchor="middle" font-size="11" fill="#64748b">Have they used this</text>
  <text x="380" y="84" text-anchor="middle" font-size="11" fill="#64748b">feature before?</text>

  <rect x="540" y="20" width="200" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="640" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Current Context</text>
  <text x="640" y="68" text-anchor="middle" font-size="11" fill="#64748b">What page are they on?</text>
  <text x="640" y="84" text-anchor="middle" font-size="11" fill="#64748b">What just happened?</text>

  <!-- Converging lines -->
  <line x1="120" y1="100" x2="340" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="380" y1="100" x2="380" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="640" y1="100" x2="420" y2="180" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Mode selection -->
  <rect x="240" y="180" width="280" height="80" rx="12" fill="#eef2ff" stroke="#5B3FE8" stroke-width="2"/>
  <text x="380" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#312e81">Mode Selection</text>
  <text x="380" y="230" text-anchor="middle" font-size="11" fill="#5B3FE8">ConCRG picks the right response</text>
  <text x="380" y="248" text-anchor="middle" font-size="10" fill="#6d28d9">automatically — user never chooses</text>

  <!-- Arrow down -->
  <line x1="380" y1="260" x2="380" y2="290" stroke="#5B3FE8" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- Four output boxes -->
  <rect x="20" y="294" width="155" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="97" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">FIND</text>
  <text x="97" y="342" text-anchor="middle" font-size="10" fill="#2563eb">Navigate there</text>
  <text x="97" y="357" text-anchor="middle" font-size="10" fill="#2563eb">first encounter</text>

  <rect x="195" y="294" width="155" height="70" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="272" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#064e3b">LEARN</text>
  <text x="272" y="342" text-anchor="middle" font-size="10" fill="#059669">Explain the feature</text>
  <text x="272" y="357" text-anchor="middle" font-size="10" fill="#059669">in depth</text>

  <rect x="370" y="294" width="155" height="70" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="447" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">PRACTICE</text>
  <text x="447" y="342" text-anchor="middle" font-size="10" fill="#ea580c">Guided step-by-step</text>
  <text x="447" y="357" text-anchor="middle" font-size="10" fill="#ea580c">walkthrough</text>

  <rect x="545" y="294" width="195" height="70" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="642" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">REMEMBER</text>
  <text x="642" y="342" text-anchor="middle" font-size="10" fill="#db2777">Surface past activity</text>
  <text x="642" y="357" text-anchor="middle" font-size="10" fill="#db2777">returning user</text>

  <!-- Lines from mode selection to outputs -->
  <line x1="330" y1="260" x2="97" y2="294" stroke="#5B3FE8" stroke-width="1.5"/>
  <line x1="360" y1="260" x2="272" y2="294" stroke="#5B3FE8" stroke-width="1.5"/>
  <line x1="400" y1="260" x2="447" y2="294" stroke="#5B3FE8" stroke-width="1.5"/>
  <line x1="430" y1="260" x2="642" y2="294" stroke="#5B3FE8" stroke-width="1.5"/>

</svg>
